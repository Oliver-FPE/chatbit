<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Interface</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
    <style>
        body {
            display: flex;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
        }
        #chat-window {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            border: 1px solid #ccc;
            border-radius: 8px;
            margin: 20px;
            max-width: 600px;
        }
        #messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
            background: white;
        }
        #message-input {
            display: flex;
        }
        #input {
            flex-grow: 1;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 10px;
        }
        #send {
            border: none;
            background-color: #007bff;
            color: white;
            padding: 10px;
            margin-left: 5px;
            border-radius: 4px;
            cursor: pointer;
        }
        #side-panel {
            width: 300px;
            border-left: 1px solid #ccc;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        #history {
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div id="chat-window">
        <div id="messages"></div>
        <div id="message-input">
            <input type="text" id="input" placeholder="Type your message...">
            <button id="send">Send</button>
        </div>
    </div>
    <div id="side-panel">
        <h3>Code Analysis</h3>
        <div id="code-analysis-panel">[Code analysis results will be displayed here]</div>
        <h3>Conversation History</h3>
        <div id="history">[Conversation history will be shown here]</div>
    </div>
    <script>
        const messagesDiv = document.getElementById('messages');
        const input = document.getElementById('input');
        const sendButton = document.getElementById('send');
        const historyDiv = document.getElementById('history');

        // Function to add a message to the chat
        function addMessage(content) {
            const messageDiv = document.createElement('div');
            messageDiv.innerText = content;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        sendButton.addEventListener('click', () => {
            const messageText = input.value;
            if (messageText) {
                addMessage(`You: ${messageText}`);
                input.value = ''; // Clear input
                // Simulate receiving a response
                setTimeout(() => addMessage(`Bot: This is a response to '${messageText}'`), 1000);
            }
        });
    </script>
</body>
</html>
